spring:
  application:
    name: wiam
  threads:
    virtual:
      enabled: true
  # --- Configurazione DataSource SQLite ---
  # Usiamo SQLite come database di runtime. Il file viene creato automaticamente
  # nella cartella ./data/ relativa alla directory di esecuzione.
  datasource:
    url: jdbc:sqlite:./data/wiam.db
    driver-class-name: org.sqlite.JDBC
    # SQLite non supporta connection pool tradizionali — usiamo queste impostazioni
    # per evitare errori di concorrenza (SQLite permette una sola scrittura alla volta)
    hikari:
      maximum-pool-size: 1

  # --- Configurazione JPA / Hibernate ---
  jpa:
    # Non specifichiamo database-platform esplicitamente.
    # Il jar hibernate-community-dialects registra un DialectResolver via SPI
    # (META-INF/services) che rileva automaticamente SQLite dall'URL JDBC.
    # Questo evita problemi di classloading in alcuni IDE.

    # "update" crea le tabelle se non esistono e aggiunge colonne nuove,
    # senza cancellare dati esistenti. Ideale per sviluppo.
    hibernate:
      ddl-auto: update
    # Mostra le query SQL generate da Hibernate nella console — utile per debug.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
#Chiave segreta wiam otp
wiam:
  otp:
    secret: ${wiam.otp.secret:default-otp-secret-key}
#-- configurazione per admin --#
roles:
    admin:
      email: ${admin.email:test1234@gmail.com}
    collaborator:
      email: ${collaborator.email:collab123@gmail.com}
  # --- H2 Console ---
  # Abilitata per poter ispezionare il database via browser su /h2-console
  # Nota: in produzione va disabilitata.
  h2:
    console:
      enabled: true
      path: /h2-console

# --- Logging ---
# Il pattern include [%X{tracingId}] che legge il valore dal MDC di SLF4J.
# Grazie al TracingFilter, ogni richiesta HTTP avrà un tracingId nel MDC,
# e apparirà automaticamente in ogni riga di log.
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{tracingId}] %-5level [%thread] %logger{36} - %msg%n"
